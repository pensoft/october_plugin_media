fields:
    name:
        label: Name
        span: left
        required: 1
        type: text
    flyer_image:
        label: 'Flyer image'
        mode: image
        imageWidth: '200'
        useCaption: true
        fileTypes: 'svg,png,jpg'
        thumbOptions:
            mode: crop
            extension: auto
        span: right
        type: fileupload
    file:
        label: File
        span: left
        mode: file
        useCaption: true
        thumbOptions:
            mode: crop
            extension: auto
        required: 1
        type: fileupload
    url:
        label: URL
        comment: 'If set, the Download button on the frontend links to this URL (e.g. Zenodo) instead of the uploaded file.'
        span: left
        type: text
    file_print:
        label: 'File (Print)'
        span: left
        mode: file
        useCaption: true
        thumbOptions:
            mode: crop
            extension: auto
        required: 0
        type: fileupload
    file_lang_versions:
        label: 'File language versoins'
        mode: file
        useCaption: true
        thumbOptions:
            mode: crop
            extension: auto
        span: auto
        type: fileupload
    category:
        label: Category
        type: dropdown
        placeholder: 'Select Category'
        span: auto
    sort_order:
        label: Order
        span: auto
        default: '1'
        type: number
